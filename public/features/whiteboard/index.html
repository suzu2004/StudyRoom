<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Whiteboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/core/css/base.css"/>
<link rel="stylesheet" href="/features/whiteboard/whiteboard.css"/>
</head>
<body>
<div class="wb-wrap">
  <div class="wb-toolbar">
    <button class="wb-tool active" id="tool-pen" onclick="setTool('pen')" title="Pen">✏️</button>
    <button class="wb-tool" id="tool-rect" onclick="setTool('rect')" title="Rectangle">⬜</button>
    <button class="wb-tool" id="tool-circle" onclick="setTool('circle')" title="Circle">⭕</button>
    <button class="wb-tool" id="tool-eraser" onclick="setTool('eraser')" title="Eraser">🧹</button>
    <div class="wb-sep"></div>
    <input type="color" id="color-pick" value="#1D9E75" onchange="setColor(this.value)" title="Color"/>
    <div class="wb-sep"></div>
    <button class="wb-tool" id="tool-thin" onclick="setSize(2)" title="Thin">─</button>
    <button class="wb-tool active-size" id="tool-mid" onclick="setSize(4)" title="Medium">━</button>
    <button class="wb-tool" id="tool-thick" onclick="setSize(8)" title="Thick">▬</button>
    <div class="wb-sep"></div>
    <button class="wb-tool" onclick="undoLast()" title="Undo">↩</button>
    <button class="wb-tool" onclick="clearBoard()" title="Clear">🗑️</button>
  </div>
  <canvas id="wb-canvas"></canvas>
</div>
<script src="/features/whiteboard/whiteboard.js"></script>
</body>
</html>
