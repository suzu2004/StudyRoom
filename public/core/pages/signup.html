<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StudyRoom — Sign Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/core/css/base.css"/>
<link rel="stylesheet" href="/core/css/auth.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="dot"></span> StudyRoom</div>
    <h1>Create account</h1>
    <p class="sub">Join and start studying together</p>
    <div id="err" class="error-msg hidden"></div>
    <div class="field"><label>Full name</label><input type="text" id="name" placeholder="Rahul Das" autocomplete="name"/></div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="Min 6 characters" autocomplete="new-password"/></div>
    <button class="btn-primary" id="btn" onclick="doSignup()">Create account</button>
    <div class="auth-switch">Already have an account? <a href="/">Login</a></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="/core/js/api.js"></script>
<script src="/core/js/auth.js"></script>
</body>
</html>
