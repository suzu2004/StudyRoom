<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StudyRoom — Public Lobby</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/core/css/base.css"/>
<link rel="stylesheet" href="/core/css/app-shell.css"/>
<link rel="stylesheet" href="/core/css/lobby.css"/>
</head>
<body>
<div class="app-shell" id="app-shell">
<aside class="sidebar" id="app-sidebar"></aside>
<div class="app-content">
<div class="lobby-page">
  <nav class="lobby-nav">
    <!-- Logo — clicking goes to dashboard (Issue 5) -->
    <div class="lobby-logo" id="lobby-logo" onclick="goHome()" title="Go to home" style="cursor:pointer">
      <div class="lobby-logo-icon"><i data-lucide="book-open"></i></div>
      StudyRoom
    </div>
    <div class="live-count"><div class="live-dot"></div><span id="live-count">0 rooms live</span></div>

    <div class="lobby-nav-links">
      <button onclick="toggleTheme()" style="background:transparent;border:none;cursor:pointer;color:var(--text);display:flex;align-items:center;margin-right:12px;padding:4px;" title="Toggle Theme">
        <i data-lucide="moon" id="theme-icon" style="width:20px;height:20px"></i>
      </button>
      <a href="/join" class="nav-link"><i data-lucide="key" style="width:16px;height:16px;margin-right:4px;"></i> Join with Code</a>

      <!-- Issue 4: Guest identity — shown when NOT logged in -->
      <div class="guest-identity" id="guest-identity" style="display:none">
        <div class="guest-avatar" id="guest-nav-avatar">?</div>
        <span class="guest-nav-name" id="guest-nav-name">Guest</span>
      </div>

      <!-- Shown when logged in -->
      <div class="guest-identity" id="logged-identity" style="display:none">
        <div class="guest-avatar" id="logged-nav-avatar">?</div>
        <span class="guest-nav-name" id="logged-nav-name">User</span>
      </div>

      <div class="buddies-dropdown-wrap" id="logged-buddies-wrap" style="display:none;position:relative">
        <button class="nav-link" onclick="toggleBuddiesDropdown(event)" style="border:none;background:var(--bg3);cursor:pointer">Buddies ▾</button>
        <div class="buddies-dropdown" id="buddies-dropdown" onclick="event.stopPropagation()"></div>
      </div>
      <a href="/dashboard" class="nav-link" id="dash-link" style="display:none">Dashboard</a>
      <div id="auth-links" style="display:none">
        <a href="/" class="nav-link subtle-auth">Log in</a>
        <a href="/signup" class="nav-link subtle-auth">Sign up</a>
      </div>
    </div>
  </nav>
  <div class="lobby-body">
    <div class="lobby-hero">
      <h1>Public Study Rooms</h1>
      <p id="lobby-hero-sub">Browse and join live study sessions</p>
    </div>
    <div class="lobby-filters">
      <input type="text" class="search-box" id="search" placeholder="Search rooms..." oninput="filterRooms()"/>
      <select class="topic-filter" id="topic-filter" onchange="loadRooms()">
        <option value="All">All Topics</option>
        <option>Physics</option>
        <option>Math</option>
        <option>Chemistry</option>
        <option>Biology</option>
        <option>History</option>
        <option>English</option>
        <option>Computer Science</option>
        <option>Economics</option>
        <option>General</option>
      </select>
      <button class="refresh-btn" onclick="loadRooms()"><i data-lucide="refresh-cw" style="width:14px;height:14px;margin-right:4px"></i> Refresh</button>
    </div>
    <div class="rooms-grid" id="rooms-grid">
      <div class="lobby-empty"><div class="empty-icon"><i data-lucide="book-x"></i></div><p>Loading rooms...</p></div>
    </div>
  </div>
</div>

<!-- GUEST NAME MODAL -->
<div class="name-modal-bg" id="name-modal">
  <div class="name-modal">
    <h2>Join this room</h2>
    <p class="sub" id="join-modal-sub">Choose how you want to appear</p>
    <div id="modal-err" class="error-msg-sm hidden"></div>
    <div class="field">
      <label>Display name</label>
      <input type="text" id="guest-name-input" placeholder="Your name" maxlength="30" class="code-input" style="text-transform:none"/>
    </div>
    <div class="modal-actions" style="display:flex;flex-direction:column;gap:8px;margin-top:1rem">
      <button class="btn-go" onclick="joinAnonymous()" title="Random name">Join as Anonymous (random name)</button>
      <button class="btn-secondary" id="join-known-btn" onclick="joinAsKnown()" style="display:none">Join as <span id="join-known-label">me</span></button>
      <button class="btn-secondary" onclick="confirmJoin()">Join with name above →</button>
      <button class="btn-secondary" onclick="closeNameModal()" style="margin-top:4px">Cancel</button>
    </div>
  </div>
</div>
</div>
</div>

<div class="toast" id="toast"></div>
<script src="/core/js/api.js"></script>
<script src="/core/js/app-nav.js"></script>
<script src="/core/js/buddies-ui.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/core/js/lobby.js"></script>
</body>
</html>
